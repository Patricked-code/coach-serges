services:
  db:
    image: postgres:16-alpine
    container_name: coach_serges_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: coach_serges
      POSTGRES_PASSWORD: coach_serges_password
      POSTGRES_DB: coach_serges
    volumes:
      - coach_serges_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: coach_serges_app
    restart: unless-stopped
    depends_on:
      - db
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      DATABASE_URL: ${DATABASE_URL}
      APP_PUBLIC_NAME: ${APP_PUBLIC_NAME}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL}
    ports:
      - "3000:3000"

volumes:
  coach_serges_db_data:
